<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Do You Love Me?</title><style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:system-ui,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    overflow:hidden;
}

.card{
    width:92%;
    max-width:420px;
    background:white;
    border-radius:25px;
    padding:30px 20px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,.15);
}

h1{
    color:#ff4d79;
    margin-bottom:15px;
}

.question{
    font-size:24px;
    font-weight:700;
    min-height:80px;
    color:#333;
}

.sub{
    color:#666;
    margin-top:10px;
}

.buttons{
    position:relative;
    width:100%;
    height:180px;
    margin-top:20px;
}

button{
    border:none;
    padding:14px 28px;
    border-radius:50px;
    font-size:18px;
    cursor:pointer;
    touch-action:manipulation;
}

#yesBtn{
    background:#34c759;
    color:white;
    position:absolute;
    left:20px;
    top:60px;
    will-change:transform;
    transition:transform .18s ease;
}

#noBtn{
    background:#ff4d79;
    color:white;
    position:absolute;
    right:20px;
    top:60px;
}

.optionBtn{
    background:#ff4d79;
    color:white;
    margin:8px;
}

.heart{
    position:fixed;
    bottom:-30px;
    font-size:20px;
    animation:float linear infinite;
    opacity:.4;
    pointer-events:none;
}

@keyframes float{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-120vh);
    }
}
</style></head>
<body><div id="hearts"></div><div class="card"><div id="content"><h1>❤️ Important Survey ❤️</h1><div class="question" id="question">
Do you love me?
</div><div class="sub" id="sub">
Try clicking Yes 😌
</div><div class="buttons"><button id="yesBtn">Yes</button>
<button id="noBtn">No</button>

</div></div></div><script>

const yesBtn=document.getElementById("yesBtn");
const noBtn=document.getElementById("noBtn");
const question=document.getElementById("question");
const sub=document.getElementById("sub");

const messages=[
"Are you sure? 🤨",
"Still trying? 😂",
"Almost got it...",
"Keep chasing me 😭",
"This is getting embarrassing.",
"Your dedication is impressive.",
"Why are you working this hard?",
"You could've finished homework by now.",
"System detecting affection...",
"ERROR: Too much love detected ❤️"
];

let step=0;

function moveButton(){

    const area=document.querySelector(".buttons");

    const maxX=area.clientWidth-140;
    const maxY=100;

    const x=Math.random()*maxX;
    const y=Math.random()*maxY;

    yesBtn.style.transform=
    `translate(${x}px,${y}px)`;

    if(step<messages.length){
        question.textContent=messages[step];
        step++;
    }

    if(step===messages.length){

        setTimeout(()=>{

            question.innerHTML=
            "Oops 😌<br>You clicked No.";

            yesBtn.style.display="none";

            noBtn.style.transform="scale(1.15)";

        },500);
    }
}

yesBtn.addEventListener("mouseenter",moveButton);

yesBtn.addEventListener("touchstart",(e)=>{
    e.preventDefault();
    moveButton();
},{passive:false});

noBtn.addEventListener("click",showEnding);

function showEnding(){

document.getElementById("content").innerHTML=`

<div style="font-size:100px;">🧸❤️</div>

<h1>Survey Complete 🎉</h1>

<div style="
font-size:22px;
line-height:1.6;
margin-top:20px;
">

After extensive testing...<br><br>

We have reached only one conclusion:<br><br>

❤️ YOU SECRETLY ADORE AVANI ❤️

</div>

<p style="
margin-top:20px;
color:#666;
">

This result cannot be challenged in any court of law.

</p>

`;
}

for(let i=0;i<20;i++){

    const heart=document.createElement("div");

    heart.className="heart";
    heart.innerHTML=["❤️","💕","💖","💘"]
    [Math.floor(Math.random()*4)];

    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=
    (6+Math.random()*6)+"s";

    heart.style.animationDelay=
    Math.random()*5+"s";

    document.getElementById("hearts")
    .appendChild(heart);
}
</script></body>
</html>
